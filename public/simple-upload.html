<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Simple Upload Test</title>
<style>
body{font-family:system-ui;max-width:600px;margin:40px auto;padding:20px}
#drop{ border:3px dashed #ccc; padding:60px; text-align:center; cursor:pointer; border-radius:12px }
#drop:hover{ border-color:#666 }
#result{ margin-top:20px; padding:16px; background:#f0f0f0; border-radius:8px; white-space:pre-wrap; font-size:14px }
.success{ background:#e6ffe6!important }
.error{ background:#ffe6e6!important }
</style>
</head>
<body>
<h2>📄 极简上传测试</h2>
<p>点击下方区域选择文件，或拖拽文件到这里</p>

<div id="drop">点击或拖拽上传 TXT/MD 文件</div>
<input type="file" id="fileInput" accept=".txt,.md,.pdf,.docx" style="display:none">
<div id="result"></div>

<script>
const drop = document.getElementById('drop');
const input = document.getElementById('fileInput');
const result = document.getElementById('result');

drop.addEventListener('click', () => input.click());

drop.addEventListener('dragover', e => { e.preventDefault(); drop.style.borderColor = '#333'; });
drop.addEventListener('dragleave', () => drop.style.borderColor = '#ccc');
drop.addEventListener('drop', e => {
  e.preventDefault();
  drop.style.borderColor = '#ccc';
  handleFiles(e.dataTransfer.files);
});

input.addEventListener('change', () => handleFiles(input.files));

async function handleFiles(files) {
  if (!files.length) return;
  const file = files[0];
  result.className = '';
  result.textContent = `⏳ 正在解析: ${file.name} (${(file.size/1024).toFixed(1)}KB)...`;

  try {
    const text = await file.text();
    result.className = 'success';
    result.textContent = `✅ 解析成功!\n\n文件名: ${file.name}\n文件大小: ${(file.size/1024).toFixed(1)}KB\n字符数: ${text.length}\n行数: ${text.split('\\n').length}\n\n--- 内容预览（前500字符）---\n${text.slice(0, 500)}`;
  } catch(err) {
    result.className = 'error';
    result.textContent = `❌ 解析失败: ${err.message}`;
  }
}
</script>
</body>
</html>
