<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Parser Test</title></head><body>
<h1>Upload Test</h1>
<input type="file" id="f" accept=".txt,.md,.pdf,.docx">
<pre id="out"></pre>
<script type="module">
import { parseFile } from '/src/services/documents/parser.ts';
document.getElementById('f').onchange = async (e) => {
  const out = document.getElementById('out');
  try {
    const file = e.target.files[0];
    out.textContent = 'Parsing: ' + file.name + ' (' + file.size + ' bytes)...\n';
    const result = await parseFile(file);
    out.textContent += 'SUCCESS!\n';
    out.textContent += 'Document: ' + JSON.stringify(result.document, null, 2) + '\n';
    out.textContent += 'Chunks: ' + result.chunks.length + '\n';
    result.chunks.forEach((c, i) => {
      out.textContent += `\n--- Chunk ${i+1} ---\n${c.content.slice(0, 200)}`;
    });
  } catch(err) {
    out.textContent += 'ERROR: ' + err.message + '\n' + err.stack;
  }
};
</script>
</body></html>
